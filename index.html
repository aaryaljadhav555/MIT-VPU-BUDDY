<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MIT VPU BUDDY — AI Assistant</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
</head>

<body>

<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<header>
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div class="logo-text">MIT VPU BUDDY</div>
  </div>

  <div class="status-badge">
    <div class="status-dot"></div>
    Online
  </div>
</header>

<div class="chat-area" id="chatArea">

  <div class="welcome" id="welcomeScreen">
    <div class="welcome-icon">✦</div>

    <h2>Hello, I'm MIT VPU BUDDY</h2>

    <p>
      Your intelligent campus assistant. Ask me anything about MIT VPU —
      admissions, courses, events, and more!
    </p>

    <div class="suggestions">
      <div class="suggestion-chip" onclick="sendSuggestion(this)">
        🎓 Admission process
      </div>

      <div class="suggestion-chip" onclick="sendSuggestion(this)">
        📚 Available courses
      </div>

      <div class="suggestion-chip" onclick="sendSuggestion(this)">
        📅 Campus events
      </div>

      <div class="suggestion-chip" onclick="sendSuggestion(this)">
        🏛️ About MIT VPU
      </div>
    </div>
  </div>

</div>

<div class="input-area">

  <div class="input-wrapper">
    <textarea
      id="userInput"
      placeholder="Ask MIT VPU BUDDY anything…"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>

    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

  <div class="footer-note">
    © MIT VPU BUDDY — Your Campus AI Assistant
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
